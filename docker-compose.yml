version: "3.9"
services:
  cv-service:
    build:
      context: ./cv-service
      dockerfile: ../docker/Dockerfile.cv-service
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - CV_SERVICE_URL=http://cv-service:8001
      - ALLOWED_ORIGINS=["http://localhost:3000"]
    depends_on:
      cv-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
